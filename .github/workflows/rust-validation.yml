name: Rust Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test And Tool Contract
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        # actions/checkout v6
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Format check
        run: cargo fmt --check

      - name: Unit and integration tests
        run: cargo test

      - name: Tool schema snapshot
        run: cargo test tools::tests::tool_schema_snapshot_contract_is_stable

      - name: Print tool inventory
        run: |
          set -euo pipefail
          count=$(CLOUDFLARE_MCP_AUTH_MODE=off cargo run -- --print-tools | jq length)
          test "$count" -ge 80
          echo "tool_count=$count"

      - name: Release provenance manifest
        run: |
          set -euo pipefail
          cargo build --release
          scripts/generate-release-provenance.sh \
            --binary target/release/cloudflare-mcp \
            --output .tmp/release-provenance.json
          jq -e '
            .source.repository == "sednalabs/cloudflare-mcp" and
            .source.commit == env.GITHUB_SHA and
            .source.dirty == false and
            .binary.sha256 != "" and
            .binary.size_bytes > 0 and
            .tools.count >= 80 and
            .tools.inventory_sha256 != "" and
            .contracts.tool_schema_snapshot_sha256 != "" and
            .contracts.cloudflare_api_catalog_sha256 != "" and
            .dependencies.mcp_toolkit_rs_revision != ""
          ' .tmp/release-provenance.json >/dev/null
          jq '{source, binary: {sha256: .binary.sha256, size_bytes: .binary.size_bytes}, tools, contracts, dependencies}' \
            .tmp/release-provenance.json

      - name: Upload release binary bundle
        # actions/upload-artifact v7
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: cloudflare-mcp-linux-x86_64-stdio-${{ github.sha }}
          path: |
            target/release/cloudflare-mcp
            .tmp/release-provenance.json
          if-no-files-found: error
          retention-days: 14
